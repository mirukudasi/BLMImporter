name: Build Repo Listing

on:
  workflow_dispatch:
  push:
    branches: main
    paths:
      - source.json
      - Website/**
  release:
    types: [published, created, edited, unpublished, deleted, released]
  workflow_run:
    workflows: [Build Release]
    types:
      - completed

# GITHUB_TOKEN に GitHub Pages へのデプロイ権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

# Pages デプロイは同時実行を1つに制限
concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  listPublishDirectory: Website
  pathToCi: ci

jobs:
  build-listing:
    name: build-listing
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # ローカルリポジトリをチェックアウト
      - name: Checkout Local Repository
        uses: actions/checkout@v4

      # リスティング生成用の自動化リポジトリをチェックアウト
      - name: Checkout Automation Repository
        uses: actions/checkout@v4
        with:
          repository: vrchat-community/package-list-action
          path: ${{ env.pathToCi }}
          clean: false

      # 前回実行のキャッシュを復元
      - name: Restore Cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.pathToCi }}/.nuke/temp
            ~/.nuget/packages
          key: ${{ runner.os }}-${{ hashFiles('**/global.json', '**/*.csproj') }}

      # source.json を基に複数パッケージのリスティングを生成
      - name: Build Package Version Listing
        run: ${{ env.pathToCi }}/build.cmd BuildMultiPackageListing --root ${{ env.pathToCi }} --list-publish-directory $GITHUB_WORKSPACE/${{ env.listPublishDirectory }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # GitHub Pages デプロイ準備
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 生成したリスティングサイトを Pages 用アーティファクトとしてアップロード
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.listPublishDirectory }}

      # GitHub Pages へデプロイ
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
