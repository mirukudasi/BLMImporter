name: Build Release

on:
  workflow_dispatch:
    inputs:
      package:
        description: "リリースするパッケージ"
        required: true
        type: choice
        options:
          - com.mirukudasi.blm-importer-core
          - com.mirukudasi.blm-importer

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      packageName: ${{ github.event.inputs.package }}
      packagePath: Packages/${{ github.event.inputs.package }}
    steps:
      # ローカルリポジトリをチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # package.json から version を取得
      - name: Get Version
        id: version
        uses: zoexx/github-action-json-file-properties@b9f36ce6ee6fe2680cd3c32b2c62e22eade7e590
        with:
          file_path: "${{ env.packagePath }}/package.json"
          prop_path: "version"

      # 後続ステップで使う環境変数を設定
      - name: Set Environment Variables
        run: |
          echo "zipFile=${{ env.packageName }}-${{ steps.version.outputs.value }}.zip" >> $GITHUB_ENV
          echo "unityPackage=${{ env.packageName }}-${{ steps.version.outputs.value }}.unitypackage" >> $GITHUB_ENV
          echo "version=${{ steps.version.outputs.value }}" >> $GITHUB_ENV

      # パッケージを zip 化
      - name: Create Package Zip
        working-directory: "${{ env.packagePath }}"
        run: zip -r "${{ github.workspace }}/${{ env.zipFile }}" .

      # unitypackage 用に meta ファイル一覧を作成
      - name: Track Package Meta Files
        run: find "${{ env.packagePath }}/" -name \*.meta >> metaList

      # unitypackage を生成
      - name: Create UnityPackage
        uses: pCYSl5EDgo/create-unitypackage@v1.2.3
        with:
          package-path: ${{ env.unityPackage }}
          include-files: metaList

      # パッケージ単位で一意なタグを作成
      - name: Create Tag
        uses: rickstaa/action-create-tag@88dbf7ff6fe2405f8e8f6c6fdfd78829bc631f83
        with:
          tag: "${{ env.packageName }}-${{ env.version }}"
          force_push_tag: true

      # GitHub Release を作成し zip / unitypackage / package.json を添付
      - name: Make Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844
        with:
          tag_name: "${{ env.packageName }}-${{ env.version }}"
          name: "${{ env.packageName }} ${{ env.version }}"
          files: |
            ${{ env.zipFile }}
            ${{ env.unityPackage }}
            ${{ env.packagePath }}/package.json
